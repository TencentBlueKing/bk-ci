root $static_dir;
index index.html index.htm;

# 设置默认的ico
location = /favicon.ico {
    include gray.conf;
    header_filter_by_lua_file 'conf/lua/cors_filter.lua';
    
    access_by_lua_block {
        if ngx.var.useFrontendContainer == "true" then
            return ngx.exec("@favicon_proxy")
        end
    }
    
    # 本地文件
    root /;
    rewrite .* conf/static/favicon.ico break;
}

location @favicon_proxy {
    internal;
    proxy_pass http://$frontendService;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

location / {
    include gray.conf;
    header_filter_by_lua_file 'conf/lua/cors_filter.lua';
    set_by_lua_file $fqdn 'conf/lua/set/set_fqdn.lua';
    add_header Cache-Control no-store;
    rewrite ^/(.*) https://$fqdn/console/ redirect;
}

location ~* \.(html)$ {
    header_filter_by_lua_file 'conf/lua/cors_filter.lua';
    more_set_headers "Origin-Trial: __BKCI_ORIGIN_TRIAL__";
    include gray.conf;
    add_header Cache-Control no-store;
    
    access_by_lua_block {
        if ngx.var.useFrontendContainer == "true" then
            return ngx.exec("@html_proxy")
        end
    }
    
    try_files $uri @fallback;
}

location @html_proxy {
    internal;
    header_filter_by_lua_file 'conf/lua/cors_filter.lua';
    more_set_headers "Origin-Trial: __BKCI_ORIGIN_TRIAL__";
    add_header Cache-Control no-store;
    error_page 404 = @fallback;
    proxy_pass http://$frontendService;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_intercept_errors on;
}

location ~* \.(js|css|ttf)$ {
    include gray.conf;
    header_filter_by_lua_file 'conf/lua/cors_filter.lua';
    add_header Cache-Control max-age=2592000;
    
    access_by_lua_block {
        if ngx.var.useFrontendContainer == "true" then
            return ngx.exec("@static_proxy")
        end
    }
    
    try_files $uri @fallback;
}

location @static_proxy {
    internal;
    header_filter_by_lua_file 'conf/lua/cors_filter.lua';
    add_header Cache-Control max-age=2592000;
    error_page 404 = @fallback;
    proxy_pass http://$frontendService;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_intercept_errors on;
}

location ~* /([\w-_]+)/(.*)$ {
    include gray.conf;
    header_filter_by_lua_file 'conf/lua/cors_filter.lua';
    add_header Cache-Control max-age=2592000;
    
    access_by_lua_block {
        if ngx.var.useFrontendContainer == "true" then
            return ngx.exec("@static_proxy")
        end
    }
    
    try_files $uri @fallback;
}

location ~* /([\w-_]+) {
    include gray.conf;
    header_filter_by_lua_file 'conf/lua/cors_filter.lua';
    add_header Cache-Control max-age=2592000;
    
    access_by_lua_block {
        if ngx.var.useFrontendContainer == "true" then
            return ngx.exec("@static_proxy")
        end
    }
    
    try_files $uri @fallback;
}

location @fallback {
    set_by_lua_file $use_https 'conf/lua/set/set_use_https.lua';
    set_by_lua_file $fqdn 'conf/lua/set/set_fqdn.lua';
    set_by_lua_file $devops_identity 'conf/lua/set/set_devops_identity.lua';

    set_by_lua_block $appkey {
        return config.itlogin.paasId
    }
    set_by_lua_block $url {
        local sourceUrl = ngx.escape_uri('https://' .. ngx.var.host .. ngx.var.request_uri)
        return ngx.escape_uri('https://' .. config.bkci.host .. '/oauth/tof-api/code?url=' .. sourceUrl)
    }

    if ($use_https = "1") {
        rewrite ^/(.*) https://$fqdn/$1 redirect;
    }

    if ($devops_identity = "0") {
        rewrite ^/(.*) https://passport.woa.com/modules/passport/signin.ashx?oauth=true&url=$url&appkey=$appkey;
    }

    add_header Cache-Control no-store;
    more_set_headers "Origin-Trial: __BKCI_ORIGIN_TRIAL__";
    set $subsystem "console";
    if ($uri ~* ^/(\w+)) {
        set $subsystem $1;
    }
    
    access_by_lua_block {
        if ngx.var.useFrontendContainer == "true" then
            return ngx.exec("@fallback_proxy")
        end
    }
    
    rewrite .* /$subsystem/index.html break;
}

location @fallback_proxy {
    internal;
    add_header Cache-Control no-store;
    more_set_headers "Origin-Trial: __BKCI_ORIGIN_TRIAL__";
    
    set $subsystem "console";
    if ($uri ~* ^/(\w+)) {
        set $subsystem $1;
    }
    
    rewrite ^(.*)$ /$subsystem/index.html break;
    proxy_pass http://$frontendService;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
