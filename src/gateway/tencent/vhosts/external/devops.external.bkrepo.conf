# 外部访问层服务分发
location ~ ^/(ms/|)bkrepo/api/external/(.*)$ {
    set $access_type 'external';
    set $service "bkrepo";
    set $target '';
    set $path $2;
    set $external_location "1";
    access_by_lua_file 'conf/lua/router_srv.lua';

    include set.bkrepo.conf;

    # 设置proxy header的变量
    include proxy.set.header.common.conf;

    if ($request_uri ~* ^/(ms/|)bkrepo/api/external/(.*)$) {
        proxy_pass http://$target/$2;
    }

    # 反向代理到目标ip，端口，路径和参数
    # proxy_pass http://$target/api/$path?$args;
}

# 静态文件分发
location ~ ^/(ms/|)bkrepo/api/staticfile/(.*)$ {
    set_by_lua_block $bkrepo_static_domain {
        return config.bkrepo.static_domain
    }
    set $external_location "1";

    if ($request_uri ~* ^/(ms/|)bkrepo/api/staticfile/(.*)$) {
        proxy_pass http://$bkrepo_static_domain/$2;
    }
}

# 蓝盾桌面版下载
location ~ ^/(ms/|)bkrepo/bkci-desktop/(.*)$ {
    auth_request /auth/desktop;
    auth_request_set $uid $sent_http_x_devops_uid;
    auth_request_set $bk_token $sent_http_x_devops_bk_token;

    error_page 401 /tai-login/$2?$args;

    proxy_pass https://bkrepo.woa.com/generic/bkci-desktop/$2?$args;
}

# 太湖登录跳转
location ~ ^/tai-login/(.*)$ {
    return 302 https://login.bkdevops.qq.com/login?c_url=https://dev.bkdevops.qq.com/bkrepo/bkci-desktop/$1?$args;
}
