notices:
- if: FAILURE
  type:
  - email
  - wework-message
  receivers:
  - "${BK_CI_START_USER_NAME}"
  content: "【${BK_CI_PROJECT_NAME_CN}】- 【${BK_CI_PIPELINE_NAME}】#${BK_CI_BUILD_NUM} 执行失败，耗时${BK_CI_BUILD_TOTAL_TIME}, 触发人: ${BK_CI_START_USER_NAME}。"
