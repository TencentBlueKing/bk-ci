{{- if .Values.rollout.enable }}
apiVersion: tkex.tencent.com/v1alpha1
kind: HookTemplate
metadata:
  name: bk-devops-rollout-hook
  labels:
    io.tencent.bcs.dev/deletion-allow: Always
spec:
  args:
  - name: token # BCS个人密钥，需要对应项目的查看权限
    value: {{.Values.rollout.token}}
  - name: project # BCS 的 project code
    value: {{.Values.rollout.project}}
  - name: application # powerapp 的应用名
    value: {{.Values.rollout.project}}-rollout-hook
  - name: approvalUser # 审批人，逗号分隔
    value: {{.Values.rollout.approvalUser}}
  - name: chatID  # 群聊ID
    value: {{.Values.rollout.chatID}}
  policy: Ordered
  metrics:
  - name: webhook-rollout
    interval: 10s # 请求webhook的间隔 count不存在时一直轮询
    successfulLimit: 1  # 请求成功的次数
    successCondition: "result == \"Success\""  # 请求成功的条件
    failureLimit: 1  # 请求失败的次数
    failureCondition: "result == \"Fail\""  # 请求失败的条件
    provider:
      web:
        url: {{ .Values.rollout.url }} 
        headers:
        - key: project
          value: {{ `"{{ args.project }}"` }}
        - key: application
          value: {{`"{{ args.application }}"`}}
        - key: token
          value: {{`"{{ args.token }}"`}}
        - key: approvalUser
          value: {{`"{{ args.approvalUser }}"`}}
        - key: chatID
          value: {{`"{{ args.chatID }}"`}}
        - key: clusterID
          value: {{`"{{ args.BcsClusterID }}"`}}
        - key: namespace
          value: {{`"{{ args.WorkloadNamespace }}"`}}
        - key: workloadType
          value: {{`"{{ args.GroupVersionKind }}"`}}
        - key: workload
          value: {{`"{{ args.Workload }}"`}}
        - key: workloadRevision
          value: {{`"{{ args.WorkloadRevision }}"`}}
        - key: stepCurrent
          value: {{`"{{ args.CurrentStepIndex }}"`}}
        - key: stepTotal
          value: {{`"{{ args.TotalSteps }}"`}}
        - key: replicas
          value: {{`"{{ args.Replicas }}"`}}
        - key: currentTime
          value: {{`"{{args.CurrentTime}}"`}}
        jsonPath: "{$.result}" # 请求返回的jsonpath
        timeoutSeconds: 300   # 请求超时时间
{{- end }}
